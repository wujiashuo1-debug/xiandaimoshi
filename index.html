<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文本与 Web 挖掘刷题网站</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <div class="eyebrow">Text & Web Mining Quiz</div>
        <h1>文本与 Web 挖掘刷题网站</h1>
        <p>多文件工程版｜章节学习｜刷题｜错题｜进度｜带解析</p>
      </div>
      <div class="top-actions">
        <button id="btnExport" class="ghost">导出记录</button>
        <label class="ghost file-label">导入记录<input id="importFile" type="file" accept="application/json" /></label>
        <button id="btnReset" class="danger">重置</button>
      </div>
    </header>

    <section class="stat-grid" id="statGrid"></section>

    <main class="layout">
      <aside class="sidebar">
        <div class="panel-title">章节</div>
        <div id="chapterList" class="chapter-list"></div>
      </aside>

      <section class="content">
        <nav class="tabs" id="tabs">
          <button data-view="study" class="active">学习</button>
          <button data-view="quiz">刷题</button>
          <button data-view="wrong">错题</button>
          <button data-view="progress">进度</button>
        </nav>

        <div class="toolbar">
          <input id="searchInput" type="search" placeholder="搜索题干、选项或解析" />
          <select id="chapterSelect"></select>
          <button id="btnShowAll" class="ghost">展开答案</button>
          <button id="btnHideAll" class="ghost">隐藏答案</button>
        </div>

        <div id="viewRoot"></div>
      </section>
    </main>

    <nav class="mobile-nav" id="mobileNav">
      <button data-view="study" class="active">学习</button>
      <button data-view="quiz">刷题</button>
      <button data-view="wrong">错题</button>
      <button data-view="progress">进度</button>
    </nav>
  </div>

  <script src="questions.js"></script>
  <script src="app.js"></script>
</body>
</html>
